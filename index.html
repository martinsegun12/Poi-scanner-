<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SMC Forex Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root{
    --bg:#080c12;--surface:#0d1520;--surface2:#111d2e;--border:#1a2d45;
    --bull:#00e5a0;--bear:#ff3d6b;--neutral:#4a9eff;--warn:#ffb830;
    --text:#c8d8e8;--text-dim:#4a6080;--text-bright:#e8f4ff;--accent:#4a9eff;
    --glow-bull:0 0 24px rgba(0,229,160,.18);--glow-bear:0 0 24px rgba(255,61,107,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;padding:12px;font-size:13px;}

  .header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;}
  .header h1{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--text-bright);letter-spacing:.05em;}
  .header span{font-size:10px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;}

  .pair-selector{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:12px;}
  .selector-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
  .pair-buttons{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
  .pair-btn{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);cursor:pointer;transition:all .15s;letter-spacing:.04em;}
  .pair-btn.selected{background:rgba(74,158,255,.15);border-color:var(--accent);color:var(--accent);}
  .pair-btn:active{transform:scale(.95);}
  .scan-btn{width:100%;background:linear-gradient(135deg,#1a4a8a,#0d2d5e);border:1px solid var(--accent);color:var(--accent);font-family:'Space Mono',monospace;font-size:12px;font-weight:700;padding:11px 16px;border-radius:8px;cursor:pointer;letter-spacing:.08em;}
  .scan-btn:disabled{opacity:.5;cursor:not-allowed;}

  .session-bar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
  .session-pill{flex-shrink:0;padding:5px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);}
  .session-pill.active{background:rgba(74,158,255,.15);border-color:var(--accent);color:var(--accent);}

  .status-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;font-size:11px;color:var(--text-dim);}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--text-dim);flex-shrink:0;}
  .pulse.scanning{background:var(--warn);animation:blink .8s infinite;}
  .pulse.done{background:var(--bull);}
  .pulse.error{background:var(--bear);}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

  .pairs-grid{display:flex;flex-direction:column;gap:10px;}
  .pair-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .pair-card.bullish{border-color:rgba(0,229,160,.35);box-shadow:var(--glow-bull);}
  .pair-card.bearish{border-color:rgba(255,61,107,.35);box-shadow:var(--glow-bear);}

  .card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);}
  .pair-name{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--text-bright);}
  .pair-price{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:2px;}

  .bias-badge{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
  .bias-badge.bull{background:rgba(0,229,160,.15);color:var(--bull);border:1px solid rgba(0,229,160,.3);}
  .bias-badge.bear{background:rgba(255,61,107,.15);color:var(--bear);border:1px solid rgba(255,61,107,.3);}
  .bias-badge.neutral{background:rgba(74,158,255,.1);color:var(--neutral);border:1px solid rgba(74,158,255,.2);}

  .section-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;padding:7px 14px 3px;border-top:1px solid var(--border);}
  .tf-row{display:flex;gap:4px;padding:5px 14px 9px;flex-wrap:wrap;}
  .tf-chip{font-size:9px;font-family:'Space Mono',monospace;padding:2px 7px;border-radius:4px;border:1px solid var(--border);color:var(--text-dim);}
  .tf-chip.bull{border-color:rgba(0,229,160,.3);color:var(--bull);background:rgba(0,229,160,.05);}
  .tf-chip.bear{border-color:rgba(255,61,107,.3);color:var(--bear);background:rgba(255,61,107,.05);}
  .tf-chip.neutral{border-color:rgba(74,158,255,.2);color:var(--neutral);background:rgba(74,158,255,.05);}

  /* EQ RANGE BAR */
  .eq-section{padding:10px 14px;border-top:1px solid var(--border);}
  .eq-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
  .eq-bar-wrap{position:relative;height:20px;background:var(--surface2);border-radius:6px;border:1px solid var(--border);overflow:hidden;}
  .eq-bar-fill{position:absolute;top:0;height:100%;background:rgba(74,158,255,.15);}
  .eq-line{position:absolute;top:0;height:100%;width:2px;background:var(--warn);opacity:.7;}
  .eq-price-marker{position:absolute;top:0;height:100%;width:2px;}
  .eq-price-marker.bull{background:var(--bull);}
  .eq-price-marker.bear{background:var(--bear);}
  .eq-labels{display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);margin-top:4px;}
  .eq-mid{color:var(--warn);font-weight:700;}
  .eq-status{font-size:10px;margin-top:5px;font-weight:600;}
  .eq-status.premium{color:var(--bear);}
  .eq-status.discount{color:var(--bull);}
  .eq-status.eq{color:var(--warn);}

  .score-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
  .score-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.07em;}
  .score-dots{display:flex;gap:5px;align-items:center;}
  .dot{width:10px;height:10px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);}
  .dot.filled-bull{background:var(--bull);border-color:var(--bull);}
  .dot.filled-bear{background:var(--bear);border-color:var(--bear);}
  .score-num{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;margin-left:8px;}
  .score-num.high{color:var(--bull);}
  .score-num.mid{color:var(--warn);}
  .score-num.low{color:var(--text-dim);}

  .conditions{padding:10px 14px;display:flex;flex-direction:column;gap:6px;border-bottom:1px solid var(--border);}
  .condition-row{display:flex;align-items:center;justify-content:space-between;}
  .cond-label{font-size:11px;color:var(--text-dim);}
  .cond-status{font-size:11px;font-weight:600;}
  .cond-status.yes{color:var(--bull);}
  .cond-status.no{color:var(--text-dim);}

  /* STEP TRACKER */
  .steps{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--border);}
  .step{display:flex;align-items:flex-start;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);}
  .step-num{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .step-num.done{background:var(--bull);color:#000;}
  .step-num.active{background:var(--warn);color:#000;}
  .step-num.wait{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);}
  .step-body{flex:1;}
  .step-title{font-size:11px;}
  .step-title.done{color:var(--text);}
  .step-title.active{color:var(--warn);font-weight:600;}
  .step-title.wait{color:var(--text-dim);}
  .step-sub{font-size:10px;color:var(--text-dim);margin-top:2px;line-height:1.4;}

  /* POI CARDS */
  .poi-section{padding:10px 14px;display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--border);}
  .poi-section-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px;}
  .poi-card{border-radius:8px;overflow:hidden;border:1px solid var(--border);}
  .poi-card.reached{border-color:var(--warn);}
  .poi-header{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--surface2);}
  .poi-num{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--text-bright);}
  .poi-type-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.06em;}
  .poi-type-badge.fvg{background:rgba(74,158,255,.15);color:var(--accent);border:1px solid rgba(74,158,255,.3);}
  .poi-type-badge.ob{background:rgba(0,229,160,.12);color:var(--bull);border:1px solid rgba(0,229,160,.25);}
  .poi-type-badge.breaker{background:rgba(255,184,48,.1);color:var(--warn);border:1px solid rgba(255,184,48,.2);}
  .poi-type-badge.mitigation{background:rgba(255,61,107,.1);color:var(--bear);border:1px solid rgba(255,61,107,.2);}
  .poi-type-badge.ifvg{background:rgba(148,103,255,.15);color:#a78bfa;border:1px solid rgba(148,103,255,.3);}
  .poi-body{padding:8px 10px;display:flex;flex-direction:column;gap:3px;}
  .poi-prices{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--text-bright);}
  .poi-meta{font-size:10px;color:var(--text-dim);line-height:1.5;}
  .poi-reached-badge{font-size:10px;font-weight:700;color:var(--warn);background:rgba(255,184,48,.1);border:1px solid rgba(255,184,48,.25);border-radius:4px;padding:3px 8px;margin-top:4px;display:inline-block;}
  .poi-eq-badge{font-size:9px;padding:2px 6px;border-radius:4px;margin-left:6px;}
  .poi-eq-badge.ok{background:rgba(0,229,160,.1);color:var(--bull);border:1px solid rgba(0,229,160,.2);}
  .poi-eq-badge.skip{background:rgba(255,61,107,.08);color:var(--bear);border:1px solid rgba(255,61,107,.15);}

  /* LEVELS */
  .levels{padding:12px 14px;display:flex;flex-direction:column;gap:9px;border-top:1px solid var(--border);}
  .level-row{display:flex;align-items:flex-start;gap:10px;}
  .level-tag{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 5px;border-radius:4px;flex-shrink:0;min-width:48px;text-align:center;}
  .level-tag.entry{background:rgba(74,158,255,.15);color:var(--accent);border:1px solid rgba(74,158,255,.3);}
  .level-tag.sl{background:rgba(255,61,107,.12);color:var(--bear);border:1px solid rgba(255,61,107,.25);}
  .level-tag.tp{background:rgba(0,229,160,.12);color:var(--bull);border:1px solid rgba(0,229,160,.25);}
  .level-tag.hi{background:rgba(255,184,48,.1);color:var(--warn);border:1px solid rgba(255,184,48,.2);}
  .level-tag.lo{background:rgba(255,184,48,.1);color:var(--warn);border:1px solid rgba(255,184,48,.2);}
  .level-tag.wick{background:rgba(255,61,107,.08);color:var(--bear);border:1px solid rgba(255,61,107,.15);}
  .level-tag.fts{background:rgba(255,184,48,.1);color:var(--warn);border:1px solid rgba(255,184,48,.2);}
  .level-info{flex:1;}
  .level-price{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--text-bright);}
  .level-desc{font-size:10px;color:var(--text-dim);margin-top:1px;line-height:1.5;}
  .rr-badge{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;display:inline-block;margin-top:4px;}
  .rr-badge.good{background:rgba(0,229,160,.15);color:var(--bull);border:1px solid rgba(0,229,160,.3);}
  .rr-badge.ok{background:rgba(255,184,48,.1);color:var(--warn);border:1px solid rgba(255,184,48,.2);}
  .rr-badge.bad{background:rgba(255,61,107,.1);color:var(--bear);border:1px solid rgba(255,61,107,.2);}

  .wait-box{margin:10px 14px;padding:10px 12px;border-radius:8px;font-size:11px;line-height:1.6;border:1px solid rgba(255,184,48,.25);background:rgba(255,184,48,.06);color:var(--warn);}

  .analysis{padding:10px 14px;background:var(--surface2);border-top:1px solid var(--border);}
  .analysis-title{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
  .analysis-text{font-size:11px;color:var(--text);line-height:1.7;}

  .no-setup{padding:16px;text-align:center;color:var(--text-dim);font-size:11px;}
  .skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;height:12px;}
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
  .disclaimer{margin-top:10px;padding:8px 12px;background:rgba(255,184,48,.05);border:1px solid rgba(255,184,48,.15);border-radius:8px;font-size:10px;color:var(--text-dim);line-height:1.5;text-align:center;}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>⬡ SMC SCANNER</h1>
    <span>Origin POI · Sweep · CISD · FTS</span>
  </div>
</div>

<div class="pair-selector">
  <div class="selector-label">Select Pair</div>
  <div class="pair-buttons">
    <button class="pair-btn selected" onclick="selectPair(this,'GBP/USD')">GBPUSD</button>
    <button class="pair-btn" onclick="selectPair(this,'GBP/JPY')">GBPJPY</button>
    <button class="pair-btn" onclick="selectPair(this,'EUR/USD')">EURUSD</button>
    <button class="pair-btn" onclick="selectPair(this,'GBP/AUD')">GBPAUD</button>
    <button class="pair-btn" onclick="selectPair(this,'AUD/USD')">AUDUSD</button>
  </div>
  <button class="scan-btn" id="scanBtn" onclick="runScan()">▶ SCAN</button>
</div>

<div class="session-bar" id="sessionBar"></div>
<div class="status-bar">
  <div class="pulse" id="pulse"></div>
  <span id="statusText">Select a pair then press SCAN</span>
</div>
<div class="pairs-grid" id="pairsGrid"></div>
<div class="disclaimer">⚠ Scanner flags confluence only. Always confirm on your chart before placing orders.</div>

<script>
const API_KEY = '8835de6ad0b94dbd8e94d50c0a552f30';
const PIP = {'GBP/USD':0.0001,'EUR/USD':0.0001,'AUD/USD':0.0001,'GBP/JPY':0.01,'GBP/AUD':0.0001};
let selectedPair = 'GBP/USD';

function selectPair(el,pair){
  document.querySelectorAll('.pair-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected'); selectedPair=pair;
  document.getElementById('pairsGrid').innerHTML='';
  document.getElementById('statusText').textContent=`${pair} selected — press SCAN`;
  document.getElementById('pulse').className='pulse';
}

const pip  = pair => PIP[pair];
const pips = (pair,dist) => Math.round(Math.abs(dist)/PIP[pair]);
const fmt  = (pair,price) => (!price||isNaN(price)) ? '—' : pair.includes('JPY') ? price.toFixed(3) : price.toFixed(5);
const fmtT = t => t ? t.replace('T',' ').slice(0,16) : '—';

function getSession(){
  const h=new Date().getUTCHours();
  if(h<8) return 'Asian'; if(h<12) return 'London';
  if(h<13) return 'Overlap'; if(h<17) return 'New York';
  return 'Off-Hours';
}
function renderSessionBar(){
  const S=['Asian','London','Overlap','New York','Off-Hours'],cur=getSession();
  document.getElementById('sessionBar').innerHTML=
    S.map(s=>`<div class="session-pill ${s===cur?'active':''}">${s}</div>`).join('');
}

async function fetchCandles(symbol,interval,size=60){
  const url=`https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(symbol)}&interval=${interval}&outputsize=${size}&apikey=${API_KEY}&format=JSON`;
  const res=await fetch(url);
  const data=await res.json();
  if(data.status==='error'||!data.values) throw new Error(data.message||'API error');
  return data.values.map(c=>({t:c.datetime,o:+c.open,h:+c.high,l:+c.low,c:+c.close})).reverse();
}

// ═══════════════════════════════════════════
// BIAS
// ═══════════════════════════════════════════
function structureBias(candles){
  if(candles.length<10) return 'neutral';
  const r=candles.slice(-12);
  const H=r.map(c=>c.h),L=r.map(c=>c.l);
  const hh=H.filter((h,i)=>i>0&&h>H[i-1]).length;
  const hl=L.filter((l,i)=>i>0&&l>L[i-1]).length;
  const ll=L.filter((l,i)=>i>0&&l<L[i-1]).length;
  const lh=H.filter((h,i)=>i>0&&h<H[i-1]).length;
  if(hh>=4&&hl>=3) return 'bull';
  if(ll>=4&&lh>=3) return 'bear';
  return 'neutral';
}

// ═══════════════════════════════════════════
// EQUILIBRIUM (50% of current 4H swing range)
// ═══════════════════════════════════════════
function getEquilibrium(candles4h){
  const recent=candles4h.slice(-30);
  const high=Math.max(...recent.map(c=>c.h));
  const low=Math.min(...recent.map(c=>c.l));
  const mid=(high+low)/2;
  return {high,low,mid};
}

function isInDiscount(price,eq){ return price<=eq.mid; }  // for buys
function isInPremium(price,eq){  return price>=eq.mid; }  // for sells
function isPOIInCorrectZone(price,bias,eq){
  if(bias==='bull') return isInDiscount(price,eq);
  if(bias==='bear') return isInPremium(price,eq);
  return false;
}
function eqPosition(price,eq){
  const range=eq.high-eq.low;
  if(!range) return 50;
  return Math.round(((price-eq.low)/range)*100);
}

// ═══════════════════════════════════════════
// SWINGS
// ═══════════════════════════════════════════
function getSwings(candles,lb=4){
  const SH=[],SL=[];
  for(let i=lb;i<candles.length-lb;i++){
    const sl=candles.slice(i-lb,i+lb+1);
    if(candles[i].h===Math.max(...sl.map(c=>c.h))) SH.push({price:candles[i].h,idx:i,t:candles[i].t});
    if(candles[i].l===Math.min(...sl.map(c=>c.l))) SL.push({price:candles[i].l,idx:i,t:candles[i].t});
  }
  return{latestHigh:SH[SH.length-1],latestLow:SL[SL.length-1],
         prevHigh:SH[SH.length-2],prevLow:SL[SL.length-2],
         allHighs:SH,allLows:SL};
}

// ═══════════════════════════════════════════
// BOS DETECTION
// ═══════════════════════════════════════════
function detectBOS(candles,bias){
  for(let i=5;i<candles.length-1;i++){
    const c=candles[i];
    const prior=candles.slice(Math.max(0,i-10),i);
    if(bias==='bull'){
      const prevHigh=Math.max(...prior.map(x=>x.h));
      if(c.c>c.o&&c.c>prevHigh&&(c.c-c.o)>(c.h-c.l)*0.45) return i;
    }
    if(bias==='bear'){
      const prevLow=Math.min(...prior.map(x=>x.l));
      if(c.c<c.o&&c.c<prevLow&&(c.o-c.c)>(c.h-c.l)*0.45) return i;
    }
  }
  return -1;
}

// ═══════════════════════════════════════════
// ALL POIs — FVG, OB, Breaker, Mitigation, InvFVG
// Each with timestamp, price zone, EQ status
// ═══════════════════════════════════════════
function detectAllPOIs(candles,bias,eq,tf){
  const pois=[];

  // 1. FVGs — all of them
  for(let i=2;i<candles.length;i++){
    const a=candles[i-2],c=candles[i];
    if(bias==='bull'&&c.l>a.h){
      pois.push({
        type:'FVG',top:c.l,bot:a.h,mid:(c.l+a.h)/2,
        time:candles[i-1].t,tf,
        inEQ:isPOIInCorrectZone((c.l+a.h)/2,bias,eq)
      });
    }
    if(bias==='bear'&&c.h<a.l){
      pois.push({
        type:'FVG',top:a.l,bot:c.h,mid:(a.l+c.h)/2,
        time:candles[i-1].t,tf,
        inEQ:isPOIInCorrectZone((a.l+c.h)/2,bias,eq)
      });
    }
  }

  // 2. Order Blocks — last 2-3 opposing candles before impulse
  const bosIdx=detectBOS(candles,bias);
  if(bosIdx>=3){
    const originC=candles.slice(Math.max(0,bosIdx-3),bosIdx);
    const top=Math.max(...originC.map(c=>c.h));
    const bot=Math.min(...originC.map(c=>c.l));
    const mid=(top+bot)/2;
    pois.push({
      type:'OB',top,bot,mid,
      time:originC[0].t,timeEnd:originC[originC.length-1].t,
      bosTime:candles[bosIdx].t,tf,
      inEQ:isPOIInCorrectZone(mid,bias,eq)
    });
  }

  // 3. Breaker Blocks — old swing that was violated and reclaimed
  const swings=getSwings(candles,4);
  const p=pip(selectedPair);
  if(bias==='bull'&&swings.prevLow){
    const lv=swings.prevLow.price;
    const swept=candles.slice(-20).some(c=>c.l<lv);
    const last=candles[candles.length-1];
    if(swept&&last.c>lv){
      pois.push({
        type:'Breaker',top:lv+p*8,bot:lv-p*5,mid:lv,
        time:swings.prevLow.t,tf,
        inEQ:isPOIInCorrectZone(lv,bias,eq)
      });
    }
  }
  if(bias==='bear'&&swings.prevHigh){
    const lv=swings.prevHigh.price;
    const swept=candles.slice(-20).some(c=>c.h>lv);
    const last=candles[candles.length-1];
    if(swept&&last.c<lv){
      pois.push({
        type:'Breaker',top:lv+p*5,bot:lv-p*8,mid:lv,
        time:swings.prevHigh.t,tf,
        inEQ:isPOIInCorrectZone(lv,bias,eq)
      });
    }
  }

  // 4. Mitigation Blocks — old OB that price returned to
  if(bosIdx>=3){
    const oldBosIdx=detectBOS(candles.slice(0,bosIdx-2),bias);
    if(oldBosIdx>=3){
      const oldOrigin=candles.slice(Math.max(0,oldBosIdx-3),oldBosIdx);
      const top=Math.max(...oldOrigin.map(c=>c.h));
      const bot=Math.min(...oldOrigin.map(c=>c.l));
      const mid=(top+bot)/2;
      const last=candles[candles.length-1];
      if(last.l<=top&&last.h>=bot){
        pois.push({
          type:'Mitigation',top,bot,mid,
          time:oldOrigin[0].t,timeEnd:oldOrigin[oldOrigin.length-1].t,tf,
          inEQ:isPOIInCorrectZone(mid,bias,eq)
        });
      }
    }
  }

  // 5. Inversion FVG — opposite FVG now being retested
  const oppBias=bias==='bull'?'bear':'bull';
  for(let i=2;i<candles.length-5;i++){
    const a=candles[i-2],c=candles[i];
    const last=candles[candles.length-1];
    if(oppBias==='bear'&&c.h<a.l){
      const top=a.l,bot=c.h,mid=(a.l+c.h)/2;
      if(last.l<=top&&last.h>=bot){
        pois.push({
          type:'InvFVG',top,bot,mid,
          time:candles[i-1].t,tf,
          inEQ:isPOIInCorrectZone(mid,bias,eq)
        });
        break;
      }
    }
    if(oppBias==='bull'&&c.l>a.h){
      const top=c.l,bot=a.h,mid=(c.l+a.h)/2;
      if(last.l<=top&&last.h>=bot){
        pois.push({
          type:'InvFVG',top,bot,mid,
          time:candles[i-1].t,tf,
          inEQ:isPOIInCorrectZone(mid,bias,eq)
        });
        break;
      }
    }
  }

  // Deduplicate by proximity and return
  return pois.filter((p,i,arr)=>
    !arr.slice(0,i).some(q=>Math.abs(q.mid-p.mid)<pip(selectedPair)*5)
  );
}

// ═══════════════════════════════════════════
// LIQUIDITY SWEEP (15m)
// Wick through swing AND close back (body or wick)
// ═══════════════════════════════════════════
function detectSweep(candles15m,bias){
  const swings=getSwings(candles15m,3);
  if(!swings.latestHigh||!swings.latestLow) return {swept:false,wickLevel:null,sweepTime:null};

  const bufPips=3; // pips for body-close confirmation
  const buf=pip(selectedPair)*bufPips;

  const last=candles15m[candles15m.length-1];
  const prev=candles15m[candles15m.length-2];

  if(bias==='bull'){
    const lv=swings.latestLow.price;
    // wick sweep: low went below, close back above
    const wickSweep=(prev.l<lv||last.l<lv)&&last.c>lv;
    // body sweep: close came back at least 3 pips above level
    const bodySweep=(prev.l<lv||last.l<lv)&&last.c>=(lv+buf);
    const swept=wickSweep||bodySweep;
    const sweepCandle=(prev.l<lv)?prev:last;
    return{
      swept,sweepLevel:lv,
      wickLevel:swept?Math.min(prev.l,last.l):null,
      sweepTime:swept?sweepCandle.t:null,
      sweepClose:swept?last.c:null
    };
  }
  if(bias==='bear'){
    const lv=swings.latestHigh.price;
    const wickSweep=(prev.h>lv||last.h>lv)&&last.c<lv;
    const bodySweep=(prev.h>lv||last.h>lv)&&last.c<=(lv-buf);
    const swept=wickSweep||bodySweep;
    const sweepCandle=(prev.h>lv)?prev:last;
    return{
      swept,sweepLevel:lv,
      wickLevel:swept?Math.max(prev.h,last.h):null,
      sweepTime:swept?sweepCandle.t:null,
      sweepClose:swept?last.c:null
    };
  }
  return{swept:false,wickLevel:null,sweepTime:null};
}

// ═══════════════════════════════════════════
// CISD — based on OPENING PRICE of last opposing candle
// Bearish CISD: close below open of last bullish candle
// Bullish CISD: close above open of last bearish candle
// Check 15m first, then 5m
// ═══════════════════════════════════════════
function detectCISD(candles,bias){
  if(candles.length<4) return {confirmed:false,tf:null,time:null};
  const r=candles.slice(-6);

  if(bias==='bull'){
    // Find last series of bearish candles (down close) → get their OPEN
    // Bullish CISD: price closes ABOVE the open of last down-close candle
    for(let i=r.length-2;i>=0;i--){
      if(r[i].c<r[i].o){ // bearish candle
        const triggerOpen=r[i].o;
        const last=r[r.length-1];
        if(last.c>triggerOpen){
          return{confirmed:true,tf:null,triggerOpen,time:last.t};
        }
        break;
      }
    }
  }
  if(bias==='bear'){
    // Bearish CISD: price closes BELOW the open of last up-close candle
    for(let i=r.length-2;i>=0;i--){
      if(r[i].c>r[i].o){ // bullish candle
        const triggerOpen=r[i].o;
        const last=r[r.length-1];
        if(last.c<triggerOpen){
          return{confirmed:true,tf:null,triggerOpen,time:last.t};
        }
        break;
      }
    }
  }
  return{confirmed:false,tf:null,time:null};
}

// ═══════════════════════════════════════════
// FTS — Failure to Swing on 5m
// ═══════════════════════════════════════════
function detectFTS(candles5m,bias){
  if(candles5m.length<3) return null;
  const last=candles5m[candles5m.length-1];
  const prev=candles5m[candles5m.length-2];
  if(bias==='bull'&&last.c>last.o&&last.l>prev.l)
    return{high:last.h,low:last.l,open:last.o,close:last.c,time:last.t};
  if(bias==='bear'&&last.c<last.o&&last.h<prev.h)
    return{high:last.h,low:last.l,open:last.o,close:last.c,time:last.t};
  return null;
}

// ═══════════════════════════════════════════
// ENTRY inside FTS zone
// ═══════════════════════════════════════════
function getEntryInsideFTS(candles5m,fts,bias){
  if(!fts) return{entry:null,type:null};
  const recent=candles5m.slice(-4);
  // FVG inside FTS
  for(let i=2;i<recent.length;i++){
    const a=recent[i-2],c=recent[i];
    if(bias==='bull'&&c.l>a.h){
      const mid=(c.l+a.h)/2;
      if(mid>=fts.low&&mid<=fts.high)
        return{entry:a.h,entryTop:c.l,entryBot:a.h,type:'FVG inside FTS'};
    }
    if(bias==='bear'&&c.h<a.l){
      const mid=(a.l+c.h)/2;
      if(mid>=fts.low&&mid<=fts.high)
        return{entry:a.l,entryTop:a.l,entryBot:c.h,type:'FVG inside FTS'};
    }
  }
  // OB inside FTS
  for(let i=1;i<recent.length-1;i++){
    const c=recent[i],n=recent[i+1];
    if(bias==='bull'&&c.c<c.o&&n.c>n.o){
      const mid=(c.o+c.l)/2;
      if(mid>=fts.low&&mid<=fts.high)
        return{entry:c.l,entryTop:c.o,entryBot:c.l,type:'OB inside FTS'};
    }
    if(bias==='bear'&&c.c>c.o&&n.c<n.o){
      const mid=(c.h+c.c)/2;
      if(mid>=fts.low&&mid<=fts.high)
        return{entry:c.h,entryTop:c.h,entryBot:c.c,type:'OB inside FTS'};
    }
  }
  // Fallback: 50% of FTS body
  if(bias==='bull') return{entry:Math.min(fts.open,fts.close),entryTop:fts.close,entryBot:fts.open,type:'FTS 50% body'};
  if(bias==='bear') return{entry:Math.max(fts.open,fts.close),entryTop:fts.open,entryBot:fts.close,type:'FTS 50% body'};
  return{entry:null,type:null};
}

// SL: below sweep wick + buffer
function calcSL(pair,bias,sweepWick,poi){
  const buf=pip(pair)*5;
  if(bias==='bull'){
    const base=sweepWick??(poi?.bot??null);
    return base?base-buf:null;
  }
  if(bias==='bear'){
    const base=sweepWick??(poi?.top??null);
    return base?base+buf:null;
  }
  return null;
}

// TP: score 5 = major (furthest), score 4 = nearest
function calcTP(bias,entry,swings1h,swings4h,score){
  if(bias==='bull'){
    const all=[...(swings1h.allHighs||[]),...(swings4h.allHighs||[])]
      .filter(s=>s.price>entry).sort((a,b)=>a.price-b.price);
    if(!all.length) return null;
    return score>=5?all[all.length-1].price:all[0].price;
  }
  if(bias==='bear'){
    const all=[...(swings1h.allLows||[]),...(swings4h.allLows||[])]
      .filter(s=>s.price<entry).sort((a,b)=>b.price-a.price);
    if(!all.length) return null;
    return score>=5?all[all.length-1].price:all[0].price;
  }
  return null;
}

function rrClass(rr){const n=+rr;return n>=2?'good':n>=1.5?'ok':'bad';}
function poiTypeClass(type){
  if(type==='FVG') return 'fvg';
  if(type==='OB') return 'ob';
  if(type==='Breaker') return 'breaker';
  if(type==='Mitigation') return 'mitigation';
  if(type==='InvFVG') return 'ifvg';
  return 'fvg';
}
function poiTypeName(type){
  if(type==='FVG') return 'Fair Value Gap';
  if(type==='OB') return 'Order Block';
  if(type==='Breaker') return 'Breaker Block';
  if(type==='Mitigation') return 'Mitigation Block';
  if(type==='InvFVG') return 'Inversion FVG';
  return type;
}

// ═══════════════════════════════════════════
// MAIN SCAN
// ═══════════════════════════════════════════
async function scanPair(pair){
  const [c1d,c4h,c1h,c15m,c5m]=await Promise.all([
    fetchCandles(pair,'1day',30),
    fetchCandles(pair,'4h',60),
    fetchCandles(pair,'1h',60),
    fetchCandles(pair,'15min',60),
    fetchCandles(pair,'5min',60),
  ]);

  const currentPrice=c5m[c5m.length-1].c;

  // Bias
  const bias1d=structureBias(c1d);
  const bias4h=structureBias(c4h);
  const bias1h=structureBias(c1h);
  let bScore=0;
  if(bias1d==='bull')bScore+=2;if(bias1d==='bear')bScore-=2;
  if(bias4h==='bull')bScore+=2;if(bias4h==='bear')bScore-=2;
  const bias=bScore>0?'bull':bScore<0?'bear':'neutral';

  // Equilibrium
  const eq=getEquilibrium(c4h);
  const priceEQPct=eqPosition(currentPrice,eq);
  const priceZone=priceEQPct>55?'Premium':priceEQPct<45?'Discount':'Equilibrium';

  // All POIs from 4H and 1H
  const pois4h=bias!=='neutral'?detectAllPOIs(c4h,bias,eq,'4H'):[];
  const pois1h=bias!=='neutral'?detectAllPOIs(c1h,bias,eq,'1H'):[];
  const allPOIs=[...pois4h,...pois1h];

  // Check which POIs price has reached
  const bufPips=pip(pair)*15;
  allPOIs.forEach(p=>{
    p.reached=currentPrice>=(p.bot-bufPips)&&currentPrice<=(p.top+bufPips);
  });

  // Primary POI: first 4H POI in correct EQ zone that price has reached
  // or nearest 4H POI in EQ zone
  const reachedPOIs=allPOIs.filter(p=>p.reached&&p.inEQ);
  const primaryPOI=reachedPOIs[0]??allPOIs.find(p=>p.inEQ)??allPOIs[0]??null;

  // Swings
  const swings4h=getSwings(c4h,5);
  const swings1h=getSwings(c1h,4);

  // Confirmation (only if price at a POI)
  const priceAtAnyPOI=reachedPOIs.length>0;

  // Sweep on 15m
  const sweep=detectSweep(c15m,bias);

  // CISD — 15m first, then 5m
  let cisd={confirmed:false,tf:null,time:null};
  if(sweep.swept){
    const cisd15=detectCISD(c15m,bias);
    if(cisd15.confirmed){ cisd={...cisd15,tf:'15m'}; }
    else{
      const cisd5=detectCISD(c5m,bias);
      if(cisd5.confirmed) cisd={...cisd5,tf:'5m'};
    }
  }

  // FTS on 5m (only after CISD)
  const fts=cisd.confirmed?detectFTS(c5m,bias):null;

  // Entry
  const entryData=fts?getEntryInsideFTS(c5m,fts,bias):{entry:null,type:null};

  // Confluence score
  const conditions=[
    {label:'HTF Bias (1D + 4H)',         met:bias!=='neutral'},
    {label:'POI in correct EQ zone',      met:allPOIs.some(p=>p.inEQ)},
    {label:'Price reached POI',           met:priceAtAnyPOI},
    {label:'Liquidity Sweep (15m)',        met:sweep.swept},
    {label:'CISD + FTS confirmed',        met:cisd.confirmed&&!!fts},
  ];
  const score=conditions.filter(c=>c.met).length;

  // Levels (score 4+ and FTS confirmed)
  let sl=null,tp=null,slPips=null,tpPips=null,rr=null,tradeType=null;
  const entryReady=score>=4&&!!fts&&!!entryData.entry;
  if(entryReady){
    sl=calcSL(pair,bias,sweep.wickLevel,primaryPOI);
    tp=calcTP(bias,entryData.entry,swings1h,swings4h,score);
    if(sl&&tp){
      slPips=pips(pair,Math.abs(entryData.entry-sl));
      tpPips=pips(pair,Math.abs(tp-entryData.entry));
      rr=slPips>0?(tpPips/slPips).toFixed(1):'?';
      tradeType=slPips>40?'Day Trade':'Scalp';
    }
  }

  // Step tracker
  let currentStep=0;
  if(bias!=='neutral') currentStep=1;
  if(allPOIs.some(p=>p.inEQ)) currentStep=2;
  if(priceAtAnyPOI) currentStep=3;
  if(sweep.swept) currentStep=4;
  if(cisd.confirmed&&fts) currentStep=5;

  // Analysis
  const session=getSession();
  const dir=bias==='bull'?'bullish':'bearish';
  const act=bias==='bull'?'BUY LIMIT':'SELL LIMIT';
  let analysis='';
  if(bias==='neutral'){
    analysis=`1D and 4H structure conflict — no clear bias. Wait for a clean BOS before looking for entries.`;
  } else {
    analysis=`Bias is ${dir} (1D: ${bias1d}, 4H: ${bias4h}). Price is at ${priceEQPct}% of the 4H range — ${priceZone}. `;
    if(!allPOIs.length) analysis+=`No POIs detected yet on 4H or 1H. `;
    else if(!allPOIs.some(p=>p.inEQ)) analysis+=`POIs found but none in the correct ${bias==='bull'?'discount':'premium'} zone. `;
    else if(!priceAtAnyPOI) analysis+=`${allPOIs.filter(p=>p.inEQ).length} valid POI(s) in EQ zone — waiting for price to reach them. `;
    else analysis+=`Price has reached a valid POI zone. `;
    if(priceAtAnyPOI&&!sweep.swept) analysis+=`Watching for 15m liquidity sweep inside the POI. Do NOT enter yet. `;
    if(sweep.swept) analysis+=`Sweep confirmed at ${fmt(pair,sweep.wickLevel)} on ${fmtT(sweep.sweepTime)}. `;
    if(sweep.swept&&!cisd.confirmed) analysis+=`Watching for CISD on 15m or 5m. `;
    if(cisd.confirmed) analysis+=`CISD confirmed on ${cisd.tf} — close ${bias==='bull'?'above':'below'} open of last opposing candle ✓. `;
    if(cisd.confirmed&&!fts) analysis+=`Waiting for FTS candle to close on 5m. `;
    if(entryReady&&sl&&tp){
      analysis+=`FTS closed ✓. Place ${act} at ${fmt(pair,entryData.entry)} (${entryData.type}). SL ${fmt(pair,sl)} (${slPips} pips — below sweep wick). TP ${fmt(pair,tp)} (${tpPips} pips — ${score>=5?'major':'nearest'} liquidity). RR 1:${rr}. ${tradeType} — ${session}.`;
    }
  }

  return{
    pair,currentPrice,bias,bias1d,bias4h,bias1h,
    eq,priceEQPct,priceZone,
    allPOIs,primaryPOI,priceAtAnyPOI,reachedPOIs,
    sweep,cisd,fts,entryData,entryReady,
    sl,tp,slPips,tpPips,rr,tradeType,
    score,conditions,swings1h,swings4h,currentStep,analysis,session
  };
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function renderCard(r){

        eq,priceEQPct,priceZone,
        allPOIs,priceAtAnyPOI,reachedPOIs,
        sweep,cisd,fts,entryData,entryReady,
        sl,tp,slPips,tpPips,rr,tradeType,
        score,conditions,swings1h,currentStep,analysis}=r;

  const bc=bias==='bull'?'bull':bias==='bear'?'bear':'neutral';
  const bl=bias==='bull'?'BULLISH':bias==='bear'?'BEARISH':'RANGING';
  const sc=score>=4?'high':score>=3?'mid':'low';
  const dc=bias==='bull'?'filled-bull':'filled-bear';
  const dots=Array.from({length:5},(_,i)=>`<div class="dot ${i<score?dc:''}"></div>`).join('');
  const crows=conditions.map(c=>`
    <div class="condition-row">
      <span class="cond-label">${c.label}</span>
      <span class="cond-status ${c.met?'yes':'no'}">${c.met?'✓ YES':'— NO'}</span>
    </div>`).join('');

  // EQ bar
  const pct=Math.min(100,Math.max(0,priceEQPct));

  const eqBar=`

        <div class="eq-bar-fill" style="left:0;width:50%"></div>

      <div class="eq-labels">
        <span>${fmt(pair,eq.low)} LOW</span>
        <span class="eq-mid">50% ${fmt(pair,eq.mid)}</span>
        <span>HIGH ${fmt(pair,eq.high)}</span>
      </div>
      <div class="eq-status ${eqZoneClass}">
        Price at ${priceEQPct}% — ${priceZone}
        ${bias==='bull'&&priceZone==='Discount'?' ✓ Valid for buys':''}
        ${bias==='bear'&&priceZone==='Premium'?' ✓ Valid for sells':''}
        ${(bias==='bull'&&priceZone!=='Discount')||(bias==='bear'&&priceZone!=='Premium')?' ⚠ Not in correct zone yet':''}
      </div>
    </div>`;

  // POI cards
  let poisHTML='';

        :`<span class="poi-eq-badge skip">Outside EQ zone</span>`;

      return `
        <div class="poi-card ${isReached?'reached':''}">
          <div class="poi-header">

        <span class="level-tag hi">HIGH</span>
        <div class="level-info">
          <div class="level-price">${fmt(pair,swings1h.latestHigh.price)}</div>
          <div class="level-desc">1H Swing High — Buy-side liquidity</div>
        </div></div>`:''}
      ${swings1h.latestLow?`<div class="level-row">
        <span class="level-tag lo">LOW</span>
        <div class="level-info">
          <div class="level-price">${fmt(pair,swings1h.latestLow.price)}</div>
          <div class="level-desc">1H Swing Low — Sell-side liquidity</div>
        </div></div>`:''}
      ${sweep.wickLevel?`<div class="level-row">
        <span class="level-tag wick">WICK</span>
        <div class="level-info">
          <div class="level-price">${fmt(pair,sweep.wickLevel)}</div>
          <div class="level-desc">15m sweep wick extreme · ${fmtT(sweep.sweepTime)}</div>
        </div></div>`:''}
      ${fts?`<div class="level-row">
        <span class="level-tag fts">FTS</span>
        <div class="level-info">
          <div class="level-price">${fmt(pair,fts.low)} – ${fmt(pair,fts.high)}</div>
          <div class="level-desc">Failure to Swing (5m) · ${fmtT(fts.time)}</div>
        </div></div>`:''}
      <div class="level-row">
        <span class="level-tag entry">ENTRY</span>
        <div class="level-info">
          <div class="level-price">${fmt(pair,entryData.entry)}</div>
          <div class="level-desc">Pending ${bias==='bull'?'BUY':'SELL'} LIMIT · ${entryData.type}</div>
        </div>
      </div>
      <div class="level-row">
        <span class="level-tag sl">SL</span>
        <div class="level-info">
          <div class="level-price">${fmt(pair,sl)}</div>
          <div class="level-desc">${slPips} pips · ${bias==='bull'?'Below':'Above'} sweep wick + 5 pip buffer</div>
        </div>
      </div>
      <div class="level-row">
        <span class="level-tag tp">TP</span>
        <div class="level-info">
          <div class="level-price">${fmt(pair,tp)}</div>
          <div class="level-desc">${tpPips} pips · ${score>=5?'Major':'Nearest'} liquidity
            <span class="rr-badge ${rrc}">RR 1:${rr}</span>
          </div>
        </div>
      </div>
    </div>`;
  } else if(sweep.swept&&!fts){
    levelsHTML=`<div class="wait-box">
      ${cisd.confirmed
        ?'CISD confirmed ✓ — waiting for FTS candle to close on 5m. Entry, SL and TP will appear after FTS closes.'
        :`Sweep confirmed ✓ — watching for CISD on ${bias==='bull'?'15m or 5m':'15m or 5m'}. Close must be ${bias==='bull'?'above':'below'} the open of the last opposing candle.`}
    </div>`;
  }

  return`
  <div class="pair-card ${bias==='bull'?'bullish':bias==='bear'?'bearish':''}">
    <div class="card-header">
      <div>
        <div class="pair-name">${pair.replace('/','')}</div>
        <div class="pair-price">${fmt(pair,currentPrice)}</div>
      </div>
      <span class="bias-badge ${bc}">${bl}</span>
    </div>
    <div class="section-label">Structure</div>
    <div class="tf-row">
      <span class="tf-chip ${bias1d}">1D: ${bias1d.toUpperCase()}</span>
      <span class="tf-chip ${bias4h}">4H: ${bias4h.toUpperCase()}</span>
      <span class="tf-chip ${bias1h}">1H: ${bias1h.toUpperCase()}</span>
    </div>
    ${eqBar}
    <div class="score-row">
      <span class="score-label">Confluence</span>
      <div style="display:flex;align-items:center">
        <div class="score-dots">${dots}</div>
        <span class="score-num ${sc}">&nbsp;${score}/5</span>
      </div>
    </div>
    <div class="conditions">${crows}</div>
    ${stepsHTML}
    ${poisHTML}
    ${levelsHTML}
    <div class="analysis">
      <div class="analysis-title">Analysis</div>
      <div class="analysis-text">${analysis}</div>
    </div>
  </div>`;
}

async function runScan(){
  const btn=document.getElementById('scanBtn');
  const pulse=document.getElementById('pulse');
  const st=document.getElementById('statusText');
  const grid=document.getElementById('pairsGrid');
  btn.disabled=true;btn.textContent='⏳ SCANNING…';
  pulse.className='pulse scanning';
  st.textContent=`Fetching ${selectedPair} — 5 timeframes…`;
  grid.innerHTML=`<div class="pair-card">
    <div class="card-header"><div class="pair-name">${selectedPair.replace('/','')}</div>
    <span class="bias-badge neutral">SCANNING…</span></div>
    <div style="padding:14px;display:flex;flex-direction:column;gap:8px">
      <div class="skeleton" style="width:80%"></div>
      <div class="skeleton" style="width:60%"></div>
      <div class="skeleton" style="width:70%"></div>
      <div class="skeleton" style="width:50%"></div>
    </div></div>`;
  try{
    const result=await scanPair(selectedPair);
    grid.innerHTML=renderCard(result);
    const now=new Date().toUTCString().slice(0,25);
    pulse.className='pulse done';
    st.textContent=`${selectedPair} · ${now} UTC · Score: ${result.score}/5 · Step ${result.currentStep}/5`;
  }catch(err){
    grid.innerHTML=`<div class="pair-card">
      <div class="card-header"><div class="pair-name">${selectedPair.replace('/','')}</div>
      <span class="bias-badge neutral">ERROR</span></div>
      <div class="no-setup" style="color:var(--bear)">⚠ ${err.message}<br><br>Rate limit — wait 60s then rescan.</div>
    </div>`;
    pulse.className='pulse error';
    st.textContent=`Error — ${err.message}`;
  }
  btn.disabled=false;btn.textContent='↺ RESCAN';
  renderSessionBar();
}
renderSessionBar();
</script>
