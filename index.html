<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SMC Forex Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #080c12;
    --surface: #0d1520;
    --surface2: #111d2e;
    --border: #1a2d45;
    --bull: #00e5a0;
    --bear: #ff3d6b;
    --neutral: #4a9eff;
    --warn: #ffb830;
    --text: #c8d8e8;
    --text-dim: #4a6080;
    --text-bright: #e8f4ff;
    --accent: #4a9eff;
    --glow-bull: 0 0 20px rgba(0,229,160,0.15);
    --glow-bear: 0 0 20px rgba(255,61,107,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 12px;
    font-size: 13px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
  }

  .header-left h1 {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: 0.05em;
  }

  .header-left span {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* PAIR SELECTOR */
  .pair-selector {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }

  .selector-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .pair-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-bottom: 12px;
  }

  .pair-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 7px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .pair-btn.selected {
    background: rgba(74,158,255,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .pair-btn:active { transform: scale(0.95); }

  .scan-btn {
    width: 100%;
    background: linear-gradient(135deg, #1a4a8a, #0d2d5e);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 11px 16px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
  }

  .scan-btn:active { transform: scale(0.98); }
  .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .session-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .session-pill {
    flex-shrink: 0;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
  }

  .session-pill.active {
    background: rgba(74,158,255,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .pulse {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }

  .pulse.scanning { background: var(--warn); animation: blink 0.8s infinite; }
  .pulse.done { background: var(--bull); }
  .pulse.error { background: var(--bear); }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .pairs-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .pair-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .pair-card.bullish { border-color: rgba(0,229,160,0.3); box-shadow: var(--glow-bull); }
  .pair-card.bearish { border-color: rgba(255,61,107,0.3); box-shadow: var(--glow-bear); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }

  .pair-name {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-bright);
  }

  .bias-badge {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .bias-badge.bull { background: rgba(0,229,160,0.15); color: var(--bull); border: 1px solid rgba(0,229,160,0.3); }
  .bias-badge.bear { background: rgba(255,61,107,0.15); color: var(--bear); border: 1px solid rgba(255,61,107,0.3); }
  .bias-badge.neutral { background: rgba(74,158,255,0.1); color: var(--neutral); border: 1px solid rgba(74,158,255,0.2); }

  .tf-row {
    display: flex;
    gap: 4px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .tf-chip {
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .tf-chip.bull { border-color: rgba(0,229,160,0.3); color: var(--bull); background: rgba(0,229,160,0.05); }
  .tf-chip.bear { border-color: rgba(255,61,107,0.3); color: var(--bear); background: rgba(255,61,107,0.05); }
  .tf-chip.neutral { border-color: rgba(74,158,255,0.2); color: var(--neutral); background: rgba(74,158,255,0.05); }

  .score-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }

  .score-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.07em; }

  .score-dots { display: flex; gap: 5px; align-items: center; }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
  }

  .dot.filled-bull { background: var(--bull); border-color: var(--bull); }
  .dot.filled-bear { background: var(--bear); border-color: var(--bear); }

  .score-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    margin-left: 8px;
  }

  .score-num.high { color: var(--bull); }
  .score-num.mid { color: var(--warn); }
  .score-num.low { color: var(--text-dim); }

  .conditions {
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-bottom: 1px solid var(--border);
  }

  .condition-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cond-label { font-size: 11px; color: var(--text-dim); }

  .cond-status { font-size: 11px; font-weight: 600; }
  .cond-status.yes { color: var(--bull); }
  .cond-status.no { color: var(--text-dim); }

  .levels {
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .level-row { display: flex; align-items: flex-start; gap: 10px; }

  .level-tag {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 4px;
    flex-shrink: 0;
    min-width: 42px;
    text-align: center;
  }

  .level-tag.entry { background: rgba(74,158,255,0.15); color: var(--accent); border: 1px solid rgba(74,158,255,0.3); }
  .level-tag.sl { background: rgba(255,61,107,0.12); color: var(--bear); border: 1px solid rgba(255,61,107,0.25); }
  .level-tag.tp { background: rgba(0,229,160,0.12); color: var(--bull); border: 1px solid rgba(0,229,160,0.25); }
  .level-tag.hi { background: rgba(255,184,48,0.1); color: var(--warn); border: 1px solid rgba(255,184,48,0.2); }
  .level-tag.lo { background: rgba(255,184,48,0.1); color: var(--warn); border: 1px solid rgba(255,184,48,0.2); }
  .level-tag.poi { background: rgba(74,158,255,0.08); color: var(--neutral); border: 1px solid rgba(74,158,255,0.15); }

  .level-info { flex: 1; }

  .level-price {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-bright);
  }

  .level-desc { font-size: 10px; color: var(--text-dim); margin-top: 1px; line-height: 1.4; }

  .rr-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(74,158,255,0.1);
    color: var(--accent);
    border: 1px solid rgba(74,158,255,0.2);
  }

  .analysis {
    padding: 10px 14px;
    background: var(--surface2);
  }

  .analysis-title {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 5px;
  }

  .analysis-text { font-size: 11px; color: var(--text); line-height: 1.6; }

  .no-setup { padding: 14px; text-align: center; color: var(--text-dim); font-size: 11px; }

  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    height: 12px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* WAIT NOTE */
  .wait-note {
    padding: 8px 12px;
    background: rgba(255,184,48,0.06);
    border: 1px solid rgba(255,184,48,0.2);
    border-radius: 8px;
    font-size: 10px;
    color: var(--warn);
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .disclaimer {
    margin-top: 10px;
    padding: 8px 12px;
    background: rgba(255,184,48,0.05);
    border: 1px solid rgba(255,184,48,0.15);
    border-radius: 8px;
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.5;
    text-align: center;
  }
</style>

<body>

<div class="header">
  <div class="header-left">
    <h1>⬡ SMC SCANNER</h1>
    <span>ICT · POI · Confluence</span>
  </div>
</div>

<!-- PAIR SELECTOR -->
<div class="pair-selector">
  <div class="selector-label">Select Pair to Scan</div>
  <div class="pair-buttons" id="pairButtons">
    <button class="pair-btn selected" onclick="selectPair(this,'GBP/USD')">GBPUSD</button>
    <button class="pair-btn" onclick="selectPair(this,'GBP/JPY')">GBPJPY</button>
    <button class="pair-btn" onclick="selectPair(this,'EUR/USD')">EURUSD</button>
    <button class="pair-btn" onclick="selectPair(this,'GBP/AUD')">GBPAUD</button>
    <button class="pair-btn" onclick="selectPair(this,'AUD/USD')">AUDUSD</button>
  </div>
  <button class="scan-btn" id="scanBtn" onclick="runScan()">▶ SCAN SELECTED PAIR</button>
</div>

<div class="wait-note" id="waitNote" style="display:none">
  ⏳ Scanning uses 5 API calls. If you hit a rate limit, wait 60 seconds then scan again.
</div>

<div class="session-bar" id="sessionBar"></div>

<div class="status-bar">
  <div class="pulse" id="pulse"></div>
  <span id="statusText">Select a pair above then press SCAN</span>
</div>

<div class="pairs-grid" id="pairsGrid"></div>

<div class="disclaimer">
  ⚠ Scanner flags confluence only. Always confirm on your chart before placing orders. Not financial advice.
</div>

<script>
const API_KEY = '8835de6ad0b94dbd8e94d50c0a552f30';

const PIP = {
  'GBP/USD': 0.0001,
  'EUR/USD': 0.0001,
  'AUD/USD': 0.0001,
  'GBP/JPY': 0.01,
  'GBP/AUD': 0.0001,
};

let selectedPair = 'GBP/USD';

function selectPair(el, pair) {
  document.querySelectorAll('.pair-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedPair = pair;
  // Clear previous result
  document.getElementById('pairsGrid').innerHTML = '';
  document.getElementById('statusText').textContent = `${pair} selected. Press SCAN.`;
  document.getElementById('pulse').className = 'pulse';
  document.getElementById('waitNote').style.display = 'none';
}

function getPips(pair, distance) {
  return Math.round(Math.abs(distance) / PIP[pair]);
}

function formatPrice(pair, price) {
  if (!price || isNaN(price)) return '—';
  return pair.includes('JPY') ? price.toFixed(3) : price.toFixed(5);
}

function getCurrentSession() {
  const utcH = new Date().getUTCHours();
  if (utcH >= 0 && utcH < 8) return 'Asian';
  if (utcH >= 8 && utcH < 12) return 'London';
  if (utcH >= 12 && utcH < 13) return 'Overlap';
  if (utcH >= 13 && utcH < 17) return 'New York';
  return 'Off-Hours';
}

function renderSessionBar() {
  const sessions = ['Asian','London','Overlap','New York','Off-Hours'];
  const current = getCurrentSession();
  document.getElementById('sessionBar').innerHTML = sessions.map(s =>
    `<div class="session-pill ${s === current ? 'active' : ''}">${s}</div>`
  ).join('');
}

async function fetchCandles(symbol, interval, outputsize = 50) {
  const url = `https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(symbol)}&interval=${interval}&outputsize=${outputsize}&apikey=${API_KEY}&format=JSON`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.status === 'error' || !data.values) throw new Error(data.message || 'API error');
  return data.values.map(c => ({
    time: c.datetime,
    o: parseFloat(c.open),
    h: parseFloat(c.high),
    l: parseFloat(c.low),
    c: parseFloat(c.close),
  })).reverse();
}

function structureBias(candles) {
  if (candles.length < 10) return 'neutral';
  const recent = candles.slice(-10);
  const highs = recent.map(c => c.h);
  const lows = recent.map(c => c.l);
  const hhCount = highs.filter((h, i) => i > 0 && h > highs[i-1]).length;
  const hlCount = lows.filter((l, i) => i > 0 && l > lows[i-1]).length;
  const llCount = lows.filter((l, i) => i > 0 && l < lows[i-1]).length;
  const lhCount = highs.filter((h, i) => i > 0 && h < highs[i-1]).length;
  if (hhCount >= 4 && hlCount >= 3) return 'bull';
  if (llCount >= 4 && lhCount >= 3) return 'bear';
  return 'neutral';
}

function getHTFBias(c1d, c4h) {
  const tf1d = structureBias(c1d);
  const tf4h = structureBias(c4h);
  let score = 0;
  if (tf1d === 'bull') score += 2;
  if (tf1d === 'bear') score -= 2;
  if (tf4h === 'bull') score += 1;
  if (tf4h === 'bear') score -= 1;
  return {
    bias: score > 0 ? 'bull' : score < 0 ? 'bear' : 'neutral',
    tf1d, tf4h
  };
}

function getSwings(candles, lookback = 4) {
  const swingHighs = [], swingLows = [];
  for (let i = lookback; i < candles.length - lookback; i++) {
    const slice = candles.slice(i - lookback, i + lookback + 1);
    if (candles[i].h === Math.max(...slice.map(c => c.h)))
      swingHighs.push({ price: candles[i].h, idx: i });
    if (candles[i].l === Math.min(...slice.map(c => c.l)))
      swingLows.push({ price: candles[i].l, idx: i });
  }
  return {
    latestHigh: swingHighs[swingHighs.length - 1],
    latestLow: swingLows[swingLows.length - 1],
    prevHigh: swingHighs[swingHighs.length - 2],
    prevLow: swingLows[swingLows.length - 2],
  };
}

// FVG: gap between candle[i-2].high and candle[i].low (bull) or reverse (bear)
function detectFVG(candles, bias) {
  const fvgs = [];
  for (let i = 2; i < candles.length; i++) {
    const c0 = candles[i-2], c2 = candles[i];
    if (bias === 'bull' && c2.l > c0.h)
      fvgs.push({ top: c2.l, bot: c0.h, mid: (c2.l + c0.h) / 2 });
    if (bias === 'bear' && c2.h < c0.l)
      fvgs.push({ top: c0.l, bot: c2.h, mid: (c0.l + c2.h) / 2 });
  }
  return fvgs.length ? fvgs[fvgs.length - 1] : null;
}

// Order Block: last opposing candle before a strong impulse move
function detectOrderBlock(candles, bias) {
  const obs = [];
  for (let i = 1; i < candles.length - 1; i++) {
    const c = candles[i], next = candles[i+1];
    if (bias === 'bull' && c.c < c.o && next.c > next.o && (next.c - next.o) > (c.o - c.c) * 1.3)
      obs.push({ top: c.o, bot: c.l, mid: (c.o + c.l) / 2 });
    if (bias === 'bear' && c.c > c.o && next.c < next.o && (next.o - next.c) > (c.c - c.o) * 1.3)
      obs.push({ top: c.h, bot: c.c, mid: (c.h + c.c) / 2 });
  }
  return obs.length ? obs[obs.length - 1] : null;
}

// Breaker Block: swing that was swept then reclaimed
function detectBreakerBlock(candles, bias, swings) {
  const last = candles[candles.length - 1];
  const pip = PIP[selectedPair];
  if (bias === 'bull' && swings.prevLow) {
    const level = swings.prevLow.price;
    const swept = candles.slice(-10).some(c => c.l < level);
    if (swept && last.c > level)
      return { top: level + pip*5, bot: level - pip*5, mid: level, label: 'Breaker Block' };
  }
  if (bias === 'bear' && swings.prevHigh) {
    const level = swings.prevHigh.price;
    const swept = candles.slice(-10).some(c => c.h > level);
    if (swept && last.c < level)
      return { top: level + pip*5, bot: level - pip*5, mid: level, label: 'Breaker Block' };
  }
  return null;
}

// Inversion FVG: opposite FVG that price is now retesting
function detectInversionFVG(candles1h, candles5m, bias) {
  const oppBias = bias === 'bull' ? 'bear' : 'bull';
  const fvg = detectFVG(candles1h.slice(0,-5), oppBias);
  if (!fvg) return null;
  const last = candles5m[candles5m.length - 1];
  if (last.l <= fvg.top && last.h >= fvg.bot)
    return { ...fvg, label: 'Inversion FVG' };
  return null;
}

// Mitigation Block: old OB that price has returned to
function detectMitigationBlock(candles1h, bias) {
  const ob = detectOrderBlock(candles1h.slice(0, -8), bias);
  if (!ob) return null;
  const last = candles1h[candles1h.length - 1];
  if (last.l <= ob.top && last.h >= ob.bot)
    return { ...ob, label: 'Mitigation Block' };
  return null;
}

// Liquidity sweep on 15m/5m
function detectLiqSweep(candles, swings, bias) {
  if (!swings.latestHigh || !swings.latestLow) return false;
  const last = candles[candles.length - 1];
  const prev = candles[candles.length - 2];
  if (bias === 'bull') {
    const level = swings.latestLow.price;
    return (prev.l < level || last.l < level) && last.c > level;
  }
  if (bias === 'bear') {
    const level = swings.latestHigh.price;
    return (prev.h > level || last.h > level) && last.c < level;
  }
  return false;
}

// CISD: failed new swing after sweep
function detectCISD(candles5m, bias) {
  if (candles5m.length < 4) return false;
  const recent = candles5m.slice(-4);
  const last = recent[3], prev = recent[2];
  if (bias === 'bull') return last.l > prev.l && last.c > last.o;
  if (bias === 'bear') return last.h < prev.h && last.c < last.o;
  return false;
}

// ─── FIXED ENTRY LOGIC ───
// Entry is placed AT the POI zone, not at current price
// For bull: entry at POI top (buy limit at top of OB/bottom of FVG)
// For bear: entry at POI bot (sell limit at bottom of OB/top of FVG)
function getEntryAtPOI(bias, poi) {
  if (!poi) return null;
  if (bias === 'bull') return poi.bot; // Buy limit at bottom of POI (best price in zone)
  if (bias === 'bear') return poi.top; // Sell limit at top of POI (best price in zone)
  return poi.mid;
}

function calculateLevels(pair, bias, entry, swings1h, poi) {
  const pip = PIP[pair];
  let sl, tp;

  if (bias === 'bull') {
    // SL: 3-5 pips below the POI bottom (or below sweep wick)
    const slBase = poi ? poi.bot : (swings1h.latestLow?.price ?? entry - pip * 20);
    sl = Math.min(slBase, swings1h.latestLow?.price ?? slBase) - pip * 4;
    // TP: previous swing high (buy-side liquidity)
    tp = swings1h.latestHigh?.price ?? (entry + (entry - sl) * 2);
  } else {
    // SL: 3-5 pips above the POI top
    const slBase = poi ? poi.top : (swings1h.latestHigh?.price ?? entry + pip * 20);
    sl = Math.max(slBase, swings1h.latestHigh?.price ?? slBase) + pip * 4;
    // TP: previous swing low (sell-side liquidity)
    tp = swings1h.latestLow?.price ?? (entry - (sl - entry) * 2);
  }

  const slPips = getPips(pair, Math.abs(entry - sl));
  const tpPips = getPips(pair, Math.abs(tp - entry));
  const rr = slPips > 0 ? (tpPips / slPips).toFixed(1) : '?';
  const tradeType = slPips > 40 ? 'Day Trade' : 'Scalp';

  return { entry, sl, tp, slPips, tpPips, rr, tradeType };
}

function buildAnalysis(pair, bias, biasData, liqSweep, cisd, poiLabel, levels, score, session) {
  const dir = bias === 'bull' ? 'bullish' : bias === 'bear' ? 'bearish' : 'ranging';
  const action = bias === 'bull' ? 'BUY LIMIT' : 'SELL LIMIT';

  if (bias === 'neutral') {
    return `${pair} 1D and 4H structure conflict — market is ranging. No valid setup. Wait for a clear Break of Structure before looking for entries.`;
  }

  let t = `HTF bias is ${dir} (1D: ${biasData.tf1d}, 4H: ${biasData.tf4h}). `;

  if (!poiLabel) {
    t += `No clear POI identified on current data. Wait for price to reach a clear OB or FVG. `;
  } else {
    t += `POI found: ${poiLabel}. `;
  }

  if (liqSweep) t += `Liquidity sweep confirmed ✓. `;
  else t += `Waiting for liquidity sweep — do not enter yet. `;

  if (cisd) t += `CISD confirmed — delivery changed ✓. `;
  else t += `CISD not yet confirmed — monitor 5m for failure candle. `;

  if (score >= 4 && levels && poiLabel) {
    t += `Place ${action} at ${formatPrice(pair, levels.entry)} (${poiLabel} zone). SL at ${formatPrice(pair, levels.sl)} (${levels.slPips} pips). TP at ${formatPrice(pair, levels.tp)} (${levels.tpPips} pips). RR 1:${levels.rr}. Trade type: ${levels.tradeType} — ${session} session.`;
  } else {
    t += `Score ${score}/5 — not all conditions met. Wait for full confluence before placing order.`;
  }

  return t;
}

async function scanPair(pair) {
  const [c1d, c4h, c1h, c15m, c5m] = await Promise.all([
    fetchCandles(pair, '1day', 30),
    fetchCandles(pair, '4h', 50),
    fetchCandles(pair, '1h', 50),
    fetchCandles(pair, '15min', 50),
    fetchCandles(pair, '5min', 60),
  ]);

  const currentPrice = c5m[c5m.length - 1].c;
  const biasData = getHTFBias(c1d, c4h);
  const bias = biasData.bias;
  const bias1h = structureBias(c1h);

  const swings1h = getSwings(c1h);
  const swings15m = getSwings(c15m, 3);

  // POI — priority: 15m FVG > 15m OB > 1H OB > Breaker > InvFVG > MitBlock
  let poi = null, poiLabel = null;
  const fvg15 = detectFVG(c15m, bias);
  const ob15  = detectOrderBlock(c15m, bias);
  const fvg1h  = detectFVG(c1h, bias);
  const ob1h   = detectOrderBlock(c1h, bias);
  const brk    = detectBreakerBlock(c1h, bias, swings1h);
  const invFVG = detectInversionFVG(c1h, c5m, bias);
  const mitBlk = detectMitigationBlock(c1h, bias);

  if (fvg15)       { poi = fvg15;  poiLabel = 'FVG (15m)'; }
  else if (ob15)   { poi = ob15;   poiLabel = 'Order Block (15m)'; }
  else if (fvg1h)  { poi = fvg1h;  poiLabel = 'FVG (1H)'; }
  else if (ob1h)   { poi = ob1h;   poiLabel = 'Order Block (1H)'; }
  else if (brk)    { poi = brk;    poiLabel = 'Breaker Block'; }
  else if (invFVG) { poi = invFVG; poiLabel = 'Inversion FVG'; }
  else if (mitBlk) { poi = mitBlk; poiLabel = 'Mitigation Block'; }

  const liqSweep = detectLiqSweep(c15m, swings15m, bias);
  const cisd     = detectCISD(c5m, bias);

  // FIXED: Entry is AT the POI zone, not current price
  const entryPrice = getEntryAtPOI(bias, poi);
  const levels = entryPrice
    ? calculateLevels(pair, bias, entryPrice, swings1h, poi)
    : null;

  const conditions = [
    { label: 'HTF Bias (1D + 4H)',   met: bias !== 'neutral' },
    { label: '1H Confirms Bias',     met: (bias === bias1h) },
    { label: 'POI Identified',       met: !!poi },
    { label: 'Liquidity Sweep',      met: liqSweep },
    { label: 'CISD Confirmed',       met: cisd },
  ];
  const score = conditions.filter(c => c.met).length;

  const session  = getCurrentSession();
  const analysis = buildAnalysis(pair, bias, biasData, liqSweep, cisd, poiLabel, levels, score, session);

  return { pair, currentPrice, bias, biasData, bias1h, poi, poiLabel, liqSweep, cisd, levels, score, conditions, swings1h, analysis, session };
}

function renderCard(r) {
  const { pair, currentPrice, bias, biasData, bias1h, score, conditions, levels, swings1h, poiLabel, poi, analysis } = r;
  const biasClass = bias === 'bull' ? 'bull' : bias === 'bear' ? 'bear' : 'neutral';
  const biasLabel = bias === 'bull' ? 'BULLISH' : bias === 'bear' ? 'BEARISH' : 'RANGING';
  const scoreClass = score >= 4 ? 'high' : score >= 3 ? 'mid' : 'low';
  const dotColor = bias === 'bull' ? 'filled-bull' : 'filled-bear';
  const dots = Array.from({length:5}, (_,i) => `<div class="dot ${i < score ? dotColor : ''}"></div>`).join('');
  const condRows = conditions.map(c =>
    `<div class="condition-row">
      <span class="cond-label">${c.label}</span>
      <span class="cond-status ${c.met ? 'yes':'no'}">${c.met ? '✓ YES':'— NO'}</span>
    </div>`
  ).join('');

  let levelsHTML = '';
  if (levels && score >= 3 && poi) {
    levelsHTML = `
    <div class="levels">
      ${swings1h.latestHigh ? `<div class="level-row">
        <span class="level-tag hi">HIGH</span>
        <div class="level-info">
          <div class="level-price">${formatPrice(pair, swings1h.latestHigh.price)}</div>
          <div class="level-desc">Swing High (1H) — Buy-side liquidity</div>
        </div>
      </div>` : ''}

      ${swings1h.latestLow ? `<div class="level-row">
        <span class="level-tag lo">LOW</span>
        <div class="level-info">
          <div class="level-price">${formatPrice(pair, swings1h.latestLow.price)}</div>
          <div class="level-desc">Swing Low (1H) — Sell-side liquidity</div>
        </div>
      </div>` : ''}

      ${poi ? `<div class="level-row">
        <span class="level-tag poi">POI</span>
        <div class="level-info">
          <div class="level-price">${formatPrice(pair, poi.mid)}</div>
          <div class="level-desc">${poiLabel} zone: ${formatPrice(pair, poi.bot)} – ${formatPrice(pair, poi.top)}</div>
        </div>
      </div>` : ''}

      <div class="level-row">
        <span class="level-tag entry">ENTRY</span>
        <div class="level-info">
          <div class="level-price">${formatPrice(pair, levels.entry)}</div>
          <div class="level-desc">Pending ${bias === 'bull' ? 'BUY' : 'SELL'} LIMIT — placed at ${bias === 'bull' ? 'bottom' : 'top'} of ${poiLabel}</div>
        </div>
      </div>

      <div class="level-row">
        <span class="level-tag sl">SL</span>
        <div class="level-info">
          <div class="level-price">${formatPrice(pair, levels.sl)}</div>
          <div class="level-desc">Stop Loss — ${levels.slPips} pips · ${bias === 'bull' ? 'Below POI + sweep wick' : 'Above POI + sweep wick'}</div>
        </div>
      </div>

      <div class="level-row">
        <span class="level-tag tp">TP</span>
        <div class="level-info">
          <div class="level-price">${formatPrice(pair, levels.tp)}</div>
          <div class="level-desc">Take Profit — ${levels.tpPips} pips · Next liquidity &nbsp;<span class="rr-badge">1:${levels.rr}</span></div>
        </div>
      </div>
    </div>`;
  }

  return `
  <div class="pair-card ${bias === 'bull' ? 'bullish' : bias === 'bear' ? 'bearish' : ''}">
    <div class="card-header">
      <div>
        <div class="pair-name">${pair.replace('/','')}</div>
        <div style="font-family:Space Mono,monospace;font-size:10px;color:var(--text-dim);margin-top:2px">${formatPrice(pair, currentPrice)}</div>
      </div>
      <span class="bias-badge ${biasClass}">${biasLabel}</span>
    </div>

    <div class="tf-row">
      <span class="tf-chip ${biasData.tf1d}">1D: ${biasData.tf1d.toUpperCase()}</span>
      <span class="tf-chip ${biasData.tf4h}">4H: ${biasData.tf4h.toUpperCase()}</span>
      <span class="tf-chip ${bias1h}">1H: ${bias1h.toUpperCase()}</span>
    </div>

    <div class="score-row">
      <span class="score-label">Confluence</span>
      <div style="display:flex;align-items:center">
        <div class="score-dots">${dots}</div>
        <span class="score-num ${scoreClass}">&nbsp;${score}/5</span>
      </div>
    </div>

    <div class="conditions">${condRows}</div>

    ${levelsHTML}

    ${(!levels || score < 3) ? `<div class="no-setup">⏳ ${score < 2 ? 'No valid setup — wait for HTF alignment.' : 'Partial confluence — missing conditions above. Monitor and wait.'}</div>` : ''}

    <div class="analysis">
      <div class="analysis-title">Analysis</div>
      <div class="analysis-text">${analysis}</div>
    </div>
  </div>`;
}

async function runScan() {
  const btn = document.getElementById('scanBtn');
  const pulse = document.getElementById('pulse');
  const statusText = document.getElementById('statusText');
  const grid = document.getElementById('pairsGrid');

  btn.disabled = true;
  btn.textContent = '⏳ SCANNING…';
  pulse.className = 'pulse scanning';
  statusText.textContent = `Fetching ${selectedPair} data from Twelve Data…`;
  document.getElementById('waitNote').style.display = 'block';

  grid.innerHTML = `
    <div class="pair-card">
      <div class="card-header">
        <div class="pair-name">${selectedPair.replace('/','')}</div>
        <span class="bias-badge neutral">SCANNING…</span>
      </div>
      <div style="padding:14px;display:flex;flex-direction:column;gap:8px">
        <div class="skeleton" style="width:80%"></div>
        <div class="skeleton" style="width:60%"></div>
        <div class="skeleton" style="width:70%"></div>
        <div class="skeleton" style="width:50%"></div>
      </div>
    </div>`;

  try {
    const result = await scanPair(selectedPair);
    grid.innerHTML = renderCard(result);
    const now = new Date().toUTCString().slice(0,25);
    pulse.className = 'pulse done';
    statusText.textContent = `${selectedPair} scanned · ${now} UTC · Score: ${result.score}/5`;
  } catch (err) {
    grid.innerHTML = `
      <div class="pair-card">
        <div class="card-header">
          <div class="pair-name">${selectedPair.replace('/','')}</div>
          <span class="bias-badge neutral">ERROR</span>
        </div>
        <div class="no-setup" style="color:var(--bear)">⚠ ${err.message}<br><br>This is usually a rate limit. Wait 60 seconds and try again.</div>
      </div>`;
    pulse.className = 'pulse error';
    statusText.textContent = `Error scanning ${selectedPair} — see card below`;
  }

  btn.disabled = false;
  btn.textContent = '↺ RESCAN';
  renderSessionBar();
}

renderSessionBar();
</script>
