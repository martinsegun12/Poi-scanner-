<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMC POI Scanner | Twelve Data</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0e17;
            color: #e0e6f0;
            padding: 16px;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #00d4ff;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .subtitle {
            color: #7a8a9e;
            font-size: 14px;
            margin-bottom: 20px;
            border-left: 3px solid #00d4ff;
            padding-left: 12px;
        }
        .status-bar {
            background: #111927;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border: 1px solid #1e2a3a;
        }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-dot.idle { background: #ffb347; }
        .status-dot.scanning { background: #00d4ff; animation: pulse 1s infinite; }
        .status-dot.ready { background: #00e676; }
        .status-dot.error { background: #ff5252; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .pair-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .pair-btn {
            background: #111927;
            border: 1px solid #1e2a3a;
            color: #b0c4de;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .pair-btn:hover { background: #1a2639; border-color: #00d4ff; }
        .pair-btn.active {
            background: #00d4ff20;
            border-color: #00d4ff;
            color: #00d4ff;
            box-shadow: 0 0 20px #00d4ff10;
        }

        .card {
            background: #111927;
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 16px;
            border: 1px solid #1e2a3a;
            transition: border 0.3s;
        }
        .card.signal {
            border-color: #00d4ff40;
            background: #00d4ff08;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .pair-name {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        .pair-name small {
            font-weight: 400;
            font-size: 13px;
            color: #7a8a9e;
            margin-left: 8px;
        }
        .badge {
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge.scalp { background: #ff6b3515; color: #ff6b35; border: 1px solid #ff6b3530; }
        .badge.day { background: #00d4ff15; color: #00d4ff; border: 1px solid #00d4ff30; }
        .badge.bias { background: #ffb34715; color: #ffb347; border: 1px solid #ffb34730; }
        .badge.signal-badge { background: #00e67615; color: #00e676; border: 1px solid #00e67630; }

        .poi-list { margin: 10px 0 6px; }
        .poi-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #1a2639;
            font-size: 14px;
        }
        .poi-item:last-child { border-bottom: none; }
        .poi-label { color: #7a8a9e; }
        .poi-value { font-weight: 600; font-family: 'Courier New', monospace; }
        .poi-value.bullish { color: #00e676; }
        .poi-value.bearish { color: #ff5252; }
        .poi-value.neutral { color: #ffb347; }

        .entry-box {
            background: #0a0e17;
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            font-size: 13px;
        }
        .entry-box .level {
            text-align: center;
        }
        .entry-box .level-label {
            color: #7a8a9e;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .entry-box .level-price {
            font-weight: 700;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            margin-top: 2px;
        }
        .entry-box .level-price.entry { color: #00d4ff; }
        .entry-box .level-price.sl { color: #ff5252; }
        .entry-box .level-price.tp { color: #00e676; }

        .no-signal {
            color: #4a5a6e;
            text-align: center;
            padding: 20px 0;
            font-size: 14px;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #3a4a5e;
            font-size: 12px;
            border-top: 1px solid #1a2639;
            padding-top: 20px;
        }
        .footer a { color: #00d4ff; text-decoration: none; cursor: pointer; }

        .loading-shimmer {
            background: linear-gradient(90deg, #111927 25%, #1a2639 50%, #111927 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            height: 60px;
            margin: 10px 0;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        .scan-all-btn {
            background: #00d4ff20;
            border: 1px solid #00d4ff40;
            color: #00d4ff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .scan-all-btn:hover { background: #00d4ff30; }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        @media (max-width: 600px) {
            .entry-box { grid-template-columns: 1fr; gap: 4px; }
            .pair-btn { font-size: 11px; padding: 6px 12px; }
            .card { padding: 14px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-actions" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:8px;">
            <h1>📊 SMC POI Scanner</h1>
            <button class="scan-all-btn" onclick="scanAllPairs()">🔄 Scan All</button>
        </div>
        <div class="subtitle">Daily Bias → 4H → 1H → 15m → 5m · FVG · OB · Liquidity Sweep · CISD</div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div>
                <span class="status-dot idle" id="statusDot"></span>
                <span id="statusText">Idle — Select a pair to scan</span>
            </div>
            <div style="font-size:13px; color:#4a5a6e;">
                <span id="pairCount">0</span> pairs · 
                <span id="signalCount">0</span> signals
            </div>
        </div>

        <!-- Pair Buttons -->
        <div class="pair-grid" id="pairGrid"></div>

        <!-- Results -->
        <div id="results">
            <div class="card" style="border-style:dashed; border-color:#1e2a3a; text-align:center; padding:40px 20px;">
                <div style="font-size:40px; margin-bottom:12px;">🔍</div>
                <div style="color:#4a5a6e; font-size:15px;">Select a Forex pair above to scan for POIs</div>
                <div style="color:#3a4a5e; font-size:13px; margin-top:6px;">Powered by Twelve Data</div>
            </div>
        </div>

        <div class="footer">
            Built for GitHub Pages · Runs on Redmi 14C · 
            <a href="#" onclick="scanAllPairs(); return false;">Scan All Pairs</a>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURATION
        // ============================================================
        const TWELVE_DATA_API_KEY = 'abecf29e08e44daead07a3fe1b38dc32';
        const PAIRS = [
            'EUR/USD', 'USD/JPY', 'GBP/USD', 'USD/CHF',
            'AUD/USD', 'USD/CAD', 'NZD/USD',
            'EUR/GBP', 'EUR/JPY', 'GBP/JPY'
        ];

        // ============================================================
        // STATE
        // ============================================================
        let activePair = null;
        let scanResults = {};
        let isScanning = false;

        // ============================================================
        // DOM REFS
        // ============================================================
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const pairCount = document.getElementById('pairCount');
        const signalCount = document.getElementById('signalCount');
        const pairGrid = document.getElementById('pairGrid');
        const results = document.getElementById('results');

        // ============================================================
        // UTILITY
        // ============================================================
        function setStatus(state, msg) {
            statusDot.className = 'status-dot ' + state;
            statusText.textContent = msg;
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        function formatPrice(p) { return p ? p.toFixed(5) : '—'; }

        function getTimeframe(period) {
            const map = { '1day': '1D', '4h': '4H', '1h': '1H', '15min': '15m', '5min': '5m' };
            return map[period] || period;
        }

        // ============================================================
        // TWELVE DATA API
        // ============================================================
        async function fetchCandles(symbol, interval, count = 150) {
            const url =
                `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=${interval}&outputsize=${count}&apikey=${TWELVE_DATA_API_KEY}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            if (data.status === 'error') throw new Error(data.message || 'API error');
            if (!data.values || data.values.length < 30) throw new Error('Not enough data');
            return data.values.map(v => ({
                open: parseFloat(v.open),
                high: parseFloat(v.high),
                low: parseFloat(v.low),
                close: parseFloat(v.close),
                timestamp: new Date(v.datetime).getTime()
            }));
        }

        // ============================================================
        // CORE STRATEGY LOGIC
        // ============================================================

        function findSwings(candles, left = 3, right = 3) {
            const highs = [];
            const lows = [];
            for (let i = left; i < candles.length - right; i++) {
                let isHigh = true;
                let isLow = true;
                for (let j = i - left; j <= i + right; j++) {
                    if (j === i) continue;
                    if (candles[j].high >= candles[i].high) isHigh = false;
                    if (candles[j].low <= candles[i].low) isLow = false;
                }
                if (isHigh) highs.push({ index: i, price: candles[i].high, type: 'high' });
                if (isLow) lows.push({ index: i, price: candles[i].low, type: 'low' });
            }
            return { highs, lows };
        }

        function detectFVG(candles) {
            const fvgs = [];
            for (let i = 2; i < candles.length; i++) {
                const prev = candles[i - 2];
                const curr = candles[i - 1];
                const next = candles[i];
                if (prev.high < curr.low && next.close > curr.low) {
                    fvgs.push({
                        type: 'bullish',
                        level: curr.low,
                        top: prev.high,
                        bottom: curr.low,
                        index: i
                    });
                }
                if (prev.low > curr.high && next.close < curr.high) {
                    fvgs.push({
                        type: 'bearish',
                        level: curr.high,
                        top: curr.high,
                        bottom: prev.low,
                        index: i
                    });
                }
            }
            return fvgs;
        }

        function detectOrderBlocks(candles, swings) {
            const obs = [];
            if (candles.length < 20) return obs;
            const recent = candles.slice(-30);
            const avgRange = recent.reduce((s, c) => s + (c.high - c.low), 0) / recent.length;
            const threshold = avgRange * 2.5;

            for (let i = 5; i < candles.length - 2; i++) {
                const c = candles[i];
                const prev = candles[i - 1];
                const move = Math.abs(c.close - prev.close);
                if (move > threshold) {
                    if (c.close > prev.close) {
                        const lowIdx = Math.max(0, i - 5);
                        let lowPrice = candles[lowIdx].low;
                        for (let j = lowIdx; j <= i; j++) {
                            if (candles[j].low < lowPrice) lowPrice = candles[j].low;
                        }
                        obs.push({ type: 'bullish', level: lowPrice, index: i });
                    } else {
                        const highIdx = Math.max(0, i - 5);
                        let highPrice = candles[highIdx].high;
                        for (let j = highIdx; j <= i; j++) {
                            if (candles[j].high > highPrice) highPrice = candles[j].high;
                        }
                        obs.push({ type: 'bearish', level: highPrice, index: i });
                    }
                }
            }
            return obs.slice(-5);
        }

        function detectLiquiditySweep(candles, swings) {
            const sweeps = [];
            const recent = candles.slice(-25);
            const recentHigh = Math.max(...recent.map(c => c.high));
            const recentLow = Math.min(...recent.map(c => c.low));

            for (const s of swings.highs) {
                if (s.index > candles.length - 30 && s.index < candles.length - 3) {
                    const maxSince = Math.max(...candles.slice(s.index + 1, candles.length).map(c => c.high));
                    if (maxSince > s.price * 1.0005) {
                        sweeps.push({ type: 'high', level: s.price, index: s.index });
                    }
                }
            }
            for (const s of swings.lows) {
                if (s.index > candles.length - 30 && s.index < candles.length - 3) {
                    const minSince = Math.min(...candles.slice(s.index + 1, candles.length).map(c => c.low));
                    if (minSince < s.price * 0.9995) {
                        sweeps.push({ type: 'low', level: s.price, index: s.index });
                    }
                }
            }
            return sweeps;
        }

        function detectCISD(candles, swings) {
            const cisd = [];
            if (candles.length < 20) return cisd;
            const last = candles[candles.length - 1];
            if (!last) return cisd;

            const recentHighs = swings.highs.filter(s => s.index > candles.length - 18);
            const recentLows = swings.lows.filter(s => s.index > candles.length - 18);

            if (recentHighs.length >= 2) {
                const h1 = recentHighs[recentHighs.length - 2];
                const h2 = recentHighs[recentHighs.length - 1];
                if (h2.price < h1.price && last.close < h1.price) {
                    cisd.push({
                        type: 'bearish',
                        level: h1.price,
                        description: 'Failed to make higher high'
                    });
                }
            }
            if (recentLows.length >= 2) {
                const l1 = recentLows[recentLows.length - 2];
                const l2 = recentLows[recentLows.length - 1];
                if (l2.price > l1.price && last.close > l1.price) {
                    cisd.push({
                        type: 'bullish',
                        level: l1.price,
                        description: 'Failed to make lower low'
                    });
                }
            }
            return cisd;
        }

        // ============================================================
        // MAIN SCAN FUNCTION
        // ============================================================
        async function scanPair(symbol) {
            if (isScanning) return null;
            try {
                setStatus('scanning', `Scanning ${symbol}...`);

                const tfData = {};
                const tfs = ['1day', '4h', '1h', '15min', '5min'];
                for (const tf of tfs) {
                    try {
                        const candles = await fetchCandles(symbol, tf, 100);
                        tfData[tf] = candles;
                    } catch (e) {
                        console.warn(`Failed ${tf} for ${symbol}:`, e.message);
                        tfData[tf] = null;
                    }
                    await sleep(250);
                }

                const dCandles = tfData['1day'];
                const h4Candles = tfData['4h'];
                const h1Candles = tfData['1h'];
                const m15Candles = tfData['15min'];
                const m5Candles = tfData['5min'];

                let bias = 'neutral';
                let biasDesc = 'No clear bias';

                if (dCandles && dCandles.length > 2) {
                    const d1 = dCandles[dCandles.length - 1];
                    const d0 = dCandles[dCandles.length - 2];
                    if (d1.close > d0.close) bias = 'bullish';
                    else if (d1.close < d0.close) bias = 'bearish';
                    biasDesc = `${getTimeframe('1day')}: ${bias.toUpperCase()}`;

                    if (h4Candles && h4Candles.length > 2) {
                        const h4 = h4Candles[h4Candles.length - 1];
                        const h4p = h4Candles[h4Candles.length - 2];
                        if (h4.close > h4p.close && bias === 'bullish') bias = 'bullish';
                        else if (h4.close < h4p.close && bias === 'bearish') bias = 'bearish';
                        else bias = 'neutral';
                        biasDesc += ` · 4H: ${bias.toUpperCase()}`;
                    }
                }

                let allPOIs = [];
                let hasSignal = false;

                const scanTimeframes = [
                    { name: '15m', candles: m15Candles, label: '15m' },
                    { name: '5m', candles: m5Candles, label: '5m' }
                ];

                for (const stf of scanTimeframes) {
                    const c = stf.candles;
                    if (!c || c.length < 30) continue;

                    const swings = findSwings(c, 3, 3);
                    const fvgs = detectFVG(c);
                    const obs = detectOrderBlocks(c, swings);
                    const sweeps = detectLiquiditySweep(c, swings);
                    const cisd = detectCISD(c, swings);

                    const hasSweep = sweeps.length > 0;
                    const hasCISD = cisd.length > 0;
                    const hasPOI = fvgs.length > 0 || obs.length > 0;

                    if (hasSweep && hasCISD && hasPOI) {
                        hasSignal = true;
                        const dir = cisd[0]?.type || 'neutral';

                        allPOIs.push({
                            timeframe: stf.label,
                            bias: dir,
                            fvgs: fvgs.slice(0, 3),
                            obs: obs.slice(0, 3),
                            sweeps: sweeps.slice(0, 3),
                            cisd: cisd.slice(0, 3),
                            price: c[c.length - 1].close
                        });
                    }
                }

                const result = {
                    symbol,
                    bias,
                    biasDesc,
                    hasSignal,
                    pois: allPOIs,
                    timestamp: new Date().toISOString()
                };

                scanResults[symbol] = result;

                if (activePair === symbol) {
                    renderResult(result);
                }

                updateCounts();
                setStatus('ready', `✅ Scanned ${symbol} — ${hasSignal ? '🚨 SIGNAL FOUND' : 'No signal'}`);
                return result;

            } catch (error) {
                console.error('Scan error:', error);
                setStatus('error', `❌ Error: ${error.message}`);
                return null;
            }
        }

        // ============================================================
        // RENDER
        // ============================================================
        function renderResult(result) {
            if (!result) {
                results.innerHTML =
                    `<div class="card" style="border-style:dashed; text-align:center; padding:40px 20px; color:#4a5a6e;">No data</div>`;
                return;
            }

            let html = '';

            const biasColor = result.bias === 'bullish' ? '#00e676' : result.bias === 'bearish' ? '#ff5252' : '#ffb347';
            html += `
                <div class="card" style="border-left: 4px solid ${biasColor};">
                    <div class="card-header">
                        <span class="pair-name">${result.symbol} <small>${result.biasDesc}</small></span>
                        <span style="display:flex; gap:6px; flex-wrap:wrap;">
                            ${result.hasSignal ? '<span class="badge signal-badge">🚨 SIGNAL</span>' : ''}
                            <span class="badge bias">${result.bias.toUpperCase()}</span>
                            <span class="badge scalp">SCALP</span>
                        </span>
                    </div>
                    <div style="font-size:13px; color:#7a8a9e;">
                        ${result.hasSignal ? '✅ <strong style="color:#00d4ff;">Setup confirmed</strong> — Sweep + CISD + POI confluence' : '⏳ Waiting for sweep + CISD + POI confluence'}
                    </div>
                </div>
            `;

            if (result.pois.length > 0) {
                for (const poi of result.pois) {
                    const dirEmoji = poi.bias === 'bullish' ? '🟢' : poi.bias === 'bearish' ? '🔴' : '⚪';
                    const entryPrice = poi.bias === 'bullish' ? poi.price * 1.0003 : poi.price * 0.9997;
                    const slPrice = poi.bias === 'bullish' ? poi.price * 0.998 : poi.price * 1.002;
                    const tpPrice = poi.bias === 'bullish' ? poi.price * 1.004 : poi.price * 0.996;

                    html += `
                        <div class="card signal">
                            <div class="card-header">
                                <span style="font-weight:600;">${dirEmoji} ${poi.timeframe} — ${poi.bias.toUpperCase()} Bias</span>
                                <span class="badge day">DAY TRADE</span>
                            </div>
                            <div class="poi-list">
                                ${poi.fvgs.length > 0 ? `<div class="poi-item"><span class="poi-label">📊 FVG</span><span class="poi-value ${poi.bias}">${poi.fvgs.map(f => formatPrice(f.level)).join(', ')}</span></div>` : ''}
                                ${poi.obs.length > 0 ? `<div class="poi-item"><span class="poi-label">🧱 Order Block</span><span class="poi-value ${poi.bias}">${poi.obs.map(o => formatPrice(o.level)).join(', ')}</span></div>` : ''}
                                ${poi.sweeps.length > 0 ? `<div class="poi-item"><span class="poi-label">💧 Liquidity Sweep</span><span class="poi-value ${poi.bias}">${poi.sweeps.map(s => formatPrice(s.level)).join(', ')}</span></div>` : ''}
                                ${poi.cisd.length > 0 ? `<div class="poi-item"><span class="poi-label">🔄 CISD</span><span class="poi-value ${poi.bias}">${poi.cisd.map(c => c.description).join('; ')}</span></div>` : ''}
                            </div>
                            <div class="entry-box">
                                <div class="level"><div class="level-label">🔹 Entry (Pending)</div><div class="level-price entry">${formatPrice(entryPrice)}</div></div>
                                <div class="level"><div class="level-label">🛑 Stop Loss</div><div class="level-price sl">${formatPrice(slPrice)}</div></div>
                                <div class="level"><div class="level-label">🎯 Take Profit (2:1)</div><div class="level-price tp">${formatPrice(tpPrice)}</div></div>
                            </div>
                            <div style="font-size:11px; color:#3a4a5e; margin-top:8px;">${poi.timeframe} timeframe · ${result.symbol}</div>
                        </div>
                    `;
                }
            } else {
                html += `
                    <div class="card" style="border-color:#1e2a3a;">
                        <div class="no-signal">⏳ No POI confluence found on 15m or 5m</div>
                    </div>
                `;
            }

            results.innerHTML = html;
        }

        // ============================================================
        // UI HELPERS
        // ============================================================
        function updateCounts() {
            const total = Object.keys(scanResults).length;
            const signals = Object.values(scanResults).filter(r => r?.hasSignal).length;
            pairCount.textContent = total;
            signalCount.textContent = signals;
        }

        function renderPairButtons() {
            pairGrid.innerHTML = PAIRS.map(p =>
                `<button class="pair-btn ${activePair === p ? 'active' : ''}" data-pair="${p}">${p}</button>`
            ).join('');

            document.querySelectorAll('.pair-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const pair = btn.dataset.pair;
                    activePair = pair;
                    renderPairButtons();

                    if (scanResults[pair]) {
                        renderResult(scanResults[pair]);
                        setStatus('ready', `📊 ${pair} — ${scanResults[pair].hasSignal ? '🚨 SIGNAL' : 'No signal'}`);
                    } else {
                        await scanPair(pair);
                    }
                });
            });
        }

        // ============================================================
        // SCAN ALL PAIRS
        // ============================================================
        async function scanAllPairs() {
            if (isScanning) return;
            isScanning = true;
            setStatus('scanning', '🔍 Scanning all pairs...');
            
            for (const pair of PAIRS) {
                await scanPair(pair);
                await sleep(300);
            }
            
            isScanning = false;
            const signals = Object.values(scanResults).filter(r => r?.hasSignal).length;
            setStatus('ready', `✅ Done! ${signals} signals found`);
            
            if (activePair && scanResults[activePair]) {
                renderResult(scanResults[activePair]);
            }
        }

        // ============================================================
        // INIT
        // ============================================================
        renderPairButtons();
        setStatus('idle', '🟡 Ready — Select a pair to scan');

        setTimeout(async () => {
            if (PAIRS.length > 0) {
                activePair = PAIRS[0];
                renderPairButtons();
                await scanPair(activePair);
            }
        }, 500);

        window.scanAllPairs = scanAllPairs;

        console.log('🚀 SMC POI Scanner loaded');
        console.log(`📡 API Key: ${TWELVE_DATA_API_KEY.substring(0, 8)}...`);
        console.log(`📊 Monitoring ${PAIRS.length} pairs`);
        console.log('🔍 Click a pair or use "Scan All"');
    </script>
</body>
</html>
